version: "3.9"

# Root-level compose — works from the repo root after cloning.
# Build from source:  docker compose up --build -d
# Pull from Hub:      docker compose pull && docker compose up -d

services:
  excel-unprotect:
    build: ./excel-unprotect                    # build from local source
    image: artixskillz/excel-unprotect:latest   # or pull from Docker Hub
    container_name: excel-unprotect
    ports:
      - "5757:8000"
    volumes:
      - excel-data:/data
    restart: unless-stopped

volumes:
  excel-data:
